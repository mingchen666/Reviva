<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>词汇笔记本 — Vocabulary Book</title>
<style>
:root {
  --bg: #f5f5f0; --surface: #ffffff; --border: #ddd8d0; --text: #2c3e50;
  --text-secondary: #7f8c8d; --primary: #5b8c85; --primary-hover: #4a7a73;
  --primary-light: #e8f0ee; --accent: #e76f51; --accent-hover: #d45d3f;
  --success: #27ae60; --warning: #f39c12; --danger: #e74c3c;
  --input-bg: #f8f8f5; --radius: 8px; --shadow: 0 2px 8px rgba(0,0,0,0.08);
}
[data-theme="dark"] {
  --bg: #1a1f25; --surface: #242b33; --border: #3a4250; --text: #e0e0e0;
  --text-secondary: #a0a8b0; --primary: #6fa89e; --primary-hover: #5e9a8f;
  --primary-light: #2a3530; --accent: #e8885e; --accent-hover: #d47548;
  --success: #2ecc71; --warning: #f1c40f; --danger: #e74c3c;
  --input-bg: #1e252d; --shadow: 0 2px 8px rgba(0,0,0,0.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; }
.header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 18px; font-weight: 600; }
.header h1 span { color: var(--primary); }
.header-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); cursor: pointer; font-size: 12px; transition: all 0.2s; display: inline-flex; align-items: center; gap: 4px; }
.btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
.btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
.btn-primary:hover { background: var(--primary-hover); }
.btn-accent { background: var(--accent); color: white; border-color: var(--accent); }
.btn-accent:hover { background: var(--accent-hover); }
.main { display: flex; height: calc(100vh - 52px); }
.list-panel { width: 380px; min-width: 320px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surface); }
.search-bar { padding: 12px; border-bottom: 1px solid var(--border); }
.search-bar input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--input-bg); color: var(--text); font-size: 13px; }
.search-bar input:focus { outline: none; border-color: var(--primary); }
.filter-bar { display: flex; gap: 6px; padding: 8px 12px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.filter-chip { padding: 3px 10px; border-radius: 12px; font-size: 11px; cursor: pointer; border: 1px solid var(--border); background: var(--input-bg); color: var(--text-secondary); transition: all 0.2s; }
.filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
.word-list { flex: 1; overflow-y: auto; }
.word-item { padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; display: flex; align-items: center; gap: 10px; }
.word-item:hover { background: var(--primary-light); }
.word-item.selected { background: var(--primary-light); border-left: 3px solid var(--primary); }
.word-item .word-text { font-weight: 600; font-size: 15px; flex: 1; }
.word-item .word-phonetic { font-size: 12px; color: var(--text-secondary); }
.word-item .word-level { font-size: 10px; padding: 2px 6px; border-radius: 8px; color: white; }
.level-1 { background: #27ae60; } .level-2 { background: #2ecc71; } .level-3 { background: #f39c12; }
.level-4 { background: #e67e22; } .level-5 { background: #e74c3c; }
.detail-panel { flex: 1; overflow-y: auto; padding: 24px; background: var(--bg); }
.detail-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); font-size: 15px; }
.word-detail { max-width: 700px; margin: 0 auto; }
.detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.detail-header h2 { font-size: 28px; }
.detail-header .phonetic { font-size: 16px; color: var(--text-secondary); font-style: italic; }
.speak-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--primary); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.speak-btn:hover { background: var(--primary); color: white; }
.detail-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; }
.detail-section h4 { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.detail-section p { font-size: 14px; line-height: 1.7; }
.tag-list { display: flex; gap: 6px; flex-wrap: wrap; }
.tag { padding: 2px 8px; border-radius: 10px; font-size: 11px; background: var(--primary-light); color: var(--primary); border: 1px solid var(--primary); }
/* Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); border-radius: 12px; padding: 24px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
.modal h3 { font-size: 18px; margin-bottom: 16px; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--input-bg); color: var(--text); font-size: 13px; }
.form-group textarea { min-height: 60px; resize: vertical; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
/* Review mode */
.review-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 300; flex-direction: column; align-items: center; justify-content: center; }
.review-overlay.show { display: flex; }
.review-card { background: var(--surface); border-radius: 16px; padding: 40px; max-width: 500px; width: 90%; text-align: center; box-shadow: var(--shadow); }
.review-card .word { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
.review-card .phonetic { font-size: 16px; color: var(--text-secondary); margin-bottom: 20px; }
.review-card .reveal { font-size: 18px; color: var(--primary); margin-bottom: 20px; min-height: 30px; }
.review-card .hidden { visibility: hidden; }
.review-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.review-btn { padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
.review-again { background: #e74c3c; color: white; }
.review-hard { background: #e67e22; color: white; }
.review-good { background: #27ae60; color: white; }
.review-easy { background: #2980b9; color: white; }
.review-progress { margin-top: 16px; font-size: 13px; color: var(--text-secondary); }
/* Stats */
.stats-bar { display: flex; gap: 12px; padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--surface); }
.stat-item { text-align: center; }
.stat-item .stat-num { font-size: 18px; font-weight: 700; color: var(--primary); }
.stat-item .stat-label { font-size: 10px; color: var(--text-secondary); }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; z-index: 1000; pointer-events: none; }
.toast.show { opacity: 1; }
@media (max-width: 768px) {
  .main { flex-direction: column; }
  .list-panel { width: 100%; min-width: unset; max-height: 40vh; border-right: none; border-bottom: 1px solid var(--border); }
  .detail-panel { padding: 16px; }
  .header-actions { gap: 4px; }
  .btn { padding: 5px 8px; font-size: 11px; }
}
@media print {
  .header, .search-bar, .filter-bar, .stats-bar, .btn, .speak-btn, .modal-overlay, .review-overlay { display: none !important; }
  .main { height: auto; flex-direction: column; }
  .list-panel { width: 100%; border: none; max-height: none; }
  .word-list { overflow: visible; }
  .detail-panel { padding: 10px; }
}
</style>
</head>
<body>
<div class="header">
  <h1><span>Aa</span> 词汇笔记本</h1>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="showAddModal()">+ 添加</button>
    <button class="btn btn-accent" onclick="startReview()">复习</button>
    <button class="btn" onclick="toggleTheme()">🌓</button>
    <button class="btn" onclick="exportData()">导出</button>
    <button class="btn" onclick="importData()">导入</button>
    <button class="btn" onclick="window.print()">🖨</button>
  </div>
</div>
<div class="main">
  <div class="list-panel">
    <div class="search-bar"><input type="text" id="searchInput" placeholder="搜索单词、释义..." oninput="renderList()"></div>
    <div class="filter-bar" id="filterBar"></div>
    <div class="stats-bar">
      <div class="stat-item"><div class="stat-num" id="statTotal">0</div><div class="stat-label">总词汇</div></div>
      <div class="stat-item"><div class="stat-num" id="statDue">0</div><div class="stat-label">待复习</div></div>
      <div class="stat-item"><div class="stat-num" id="statMastered">0</div><div class="stat-label">已掌握</div></div>
    </div>
    <div class="word-list" id="wordList"></div>
  </div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-empty">← 选择一个单词查看详情</div>
  </div>
</div>
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>添加单词</h3>
    <div class="form-group"><label>单词 *</label><input type="text" id="fWord"></div>
    <div class="form-group"><label>音标</label><input type="text" id="fPhonetic" placeholder="/ˈeksəmpəl/"></div>
    <div class="form-group"><label>词性</label><select id="fPos"><option value="">选择词性</option><option>n.</option><option>v.</option><option>adj.</option><option>adv.</option><option>prep.</option><option>conj.</option><option>phr.</option></select></div>
    <div class="form-group"><label>释义 *</label><input type="text" id="fDef" placeholder="中文释义"></div>
    <div class="form-group"><label>例句</label><textarea id="fExample" placeholder="She gave an example of how to..."></textarea></div>
    <div class="form-group"><label>笔记</label><textarea id="fNotes" placeholder="记忆技巧、搭配等"></textarea></div>
    <div class="form-group"><label>标签（逗号分隔）</label><input type="text" id="fTags" placeholder="CET-4, 动词"></div>
    <div class="form-group"><label>难度 1-5</label><input type="range" id="fLevel" min="1" max="5" value="3" style="accent-color:var(--primary)"></div>
    <div class="form-actions">
      <button class="btn" onclick="hideAddModal()">取消</button>
      <button class="btn btn-primary" onclick="saveWord()">保存</button>
    </div>
  </div>
</div>
<div class="review-overlay" id="reviewOverlay">
  <div class="review-card" id="reviewCard">
    <div class="word" id="revWord"></div>
    <div class="phonetic" id="revPhonetic"></div>
    <button class="speak-btn" onclick="speakReviewWord()" style="margin:0 auto 16px">🔊</button>
    <div class="reveal hidden" id="revDef"></div>
    <button class="btn" id="revRevealBtn" onclick="revealAnswer()" style="margin-bottom:16px">显示释义</button>
    <div class="review-btns" id="revBtns" style="display:none">
      <button class="review-btn review-again" onclick="rateWord(0)">再来 (1m)</button>
      <button class="review-btn review-hard" onclick="rateWord(1)">困难 (6m)</button>
      <button class="review-btn review-good" onclick="rateWord(2)">良好 (10m)</button>
      <button class="review-btn review-easy" onclick="rateWord(3)">简单 (4d)</button>
    </div>
    <div class="review-progress" id="revProgress"></div>
    <button class="btn" onclick="endReview()" style="margin-top:12px">退出复习</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
<script>
const LS_KEY = 'vocab_book_data';
let words = [];
let selectedId = null;
let activeFilter = 'all';
let reviewQueue = [];
let reviewIdx = 0;

function loadData() {
  try { words = JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch(e) { words = []; }
  if (words.length === 0) { words = getDefaultWords(); saveData(); }
}
function saveData() { localStorage.setItem(LS_KEY, JSON.stringify(words)); }
function getDefaultWords() {
  const now = Date.now();
  return [
    {id:1,word:"ubiquitous",phonetic:"/juːˈbɪkwɪtəs/",pos:"adj.",def:"无处不在的",example:"Smartphones have become ubiquitous in modern society.",notes:"词根：ubique(everywhere) + ous",tags:["CET-6","形容词"],level:4,sm:{interval:1,repetition:0,efactor:2.5,nextReview:now},created:now},
    {id:2,word:"elaborate",phonetic:"/ɪˈlæbərət/",pos:"adj./v.",def:"精心制作的；详细阐述",example:"Could you elaborate on your proposal?",notes:"作形容词和动词发音不同：adj. /ɪˈlæbərət/ v. /ɪˈlæbəreɪt/",tags:["CET-4","动词"],level:3,sm:{interval:1,repetition:0,efactor:2.5,nextReview:now},created:now},
    {id:3,word:"pragmatic",phonetic:"/præɡˈmætɪk/",pos:"adj.",def:"务实的，注重实效的",example:"We need a pragmatic approach to solve this problem.",notes:"对比：idealistic 理想主义的",tags:["CET-6","GRE","形容词"],level:4,sm:{interval:1,repetition:0,efactor:2.5,nextReview:now},created:now},
    {id:4,word:"compromise",phonetic:"/ˈkɒmprəmaɪz/",pos:"n./v.",def:"妥协，折中",example:"Both sides agreed to compromise on the terms.",notes:"com(together) + promise(承诺) → 共同承诺 → 妥协",tags:["CET-4","名词"],level:2,sm:{interval:1,repetition:0,efactor:2.5,nextReview:now},created:now},
    {id:5,word:"inevitable",phonetic:"/ɪnˈevɪtəbl/",pos:"adj.",def:"不可避免的",example:"Change is inevitable in a growing organization.",notes:"in(not) + evitable(可避免的)",tags:["CET-4","形容词"],level:3,sm:{interval:1,repetition:0,efactor:2.5,nextReview:now},created:now},
    {id:6,word:"deteriorate",phonetic:"/dɪˈtɪəriəreɪt/",pos:"v.",def:"恶化，变坏",example:"His health continued to deteriorate over the winter.",notes:"deterior(worse) + ate → 变坏",tags:["CET-6","动词"],level:4,sm:{interval:1,repetition:0,efactor:2.5,nextReview:now},created:now},
    {id:7,word:"subsequent",phonetic:"/ˈsʌbsɪkwənt/",pos:"adj.",def:"随后的，后续的",example:"Subsequent events proved her theory correct.",notes:"sub(under/after) + sequ(follow) + ent",tags:["CET-4","形容词"],level:3,sm:{interval:1,repetition:0,efactor:2.5,nextReview:now},created:now},
    {id:8,word:"comprehensive",phonetic:"/ˌkɒmprɪˈhensɪv/",pos:"adj.",def:"全面的，综合的",example:"The report provides a comprehensive analysis of the market.",notes:"com(together) + prehend(grasp) + sive → 全部抓住的",tags:["CET-4","形容词"],level:2,sm:{interval:1,repetition:0,efactor:2.5,nextReview:now},created:now},
    {id:9,word:"resilient",phonetic:"/rɪˈzɪliənt/",pos:"adj.",def:"有弹性的，能迅速恢复的",example:"Children are often more resilient than adults think.",notes:"resili(leap back) + ent",tags:["CET-6","形容词"],level:4,sm:{interval:1,repetition:0,efactor:2.5,nextReview:now},created:now},
    {id:10,word:"ambiguous",phonetic:"/æmˈbɪɡjuəs/",pos:"adj.",def:"模棱两可的，含糊的",example:"The statement was deliberately ambiguous.",notes:"ambi(both) + ig(drive) + uous → 两边走的 → 含糊的",tags:["CET-6","GRE","形容词"],level:4,sm:{interval:1,repetition:0,efactor:2.5,nextReview:now},created:now}
  ];
}

function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }

function getAllTags() { const s = new Set(); words.forEach(w => (w.tags||[]).forEach(t => s.add(t))); return [...s].sort(); }

function renderFilters() {
  const tags = getAllTags();
  const bar = document.getElementById('filterBar');
  bar.innerHTML = `<span class="filter-chip ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">全部</span>` +
    `<span class="filter-chip ${activeFilter==='due'?'active':''}" onclick="setFilter('due')">待复习</span>` +
    tags.slice(0,6).map(t => `<span class="filter-chip ${activeFilter===t?'active':''}" onclick="setFilter('${t}')">${t}</span>`).join('');
}

function setFilter(f) { activeFilter = f; renderFilters(); renderList(); }

function getFiltered() {
  let list = [...words];
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (q) list = list.filter(w => w.word.toLowerCase().includes(q) || w.def.includes(q) || (w.example||'').toLowerCase().includes(q));
  if (activeFilter === 'due') { const now = Date.now(); list = list.filter(w => !w.sm || w.sm.nextReview <= now); }
  else if (activeFilter !== 'all') list = list.filter(w => (w.tags||[]).includes(activeFilter));
  return list.sort((a,b) => a.word.localeCompare(b.word));
}

function renderList() {
  const list = getFiltered();
  const el = document.getElementById('wordList');
  if (list.length === 0) { el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-secondary)">没有匹配的词汇</div>'; return; }
  el.innerHTML = list.map(w => `
    <div class="word-item ${selectedId===w.id?'selected':''}" onclick="selectWord(${w.id})">
      <div style="flex:1">
        <div class="word-text">${w.word}</div>
        <div class="word-phonetic">${w.phonetic||''} ${w.pos||''}</div>
      </div>
      <span class="word-level level-${w.level}">${w.level}</span>
    </div>
  `).join('');
  updateStats();
}

function updateStats() {
  document.getElementById('statTotal').textContent = words.length;
  const now = Date.now();
  document.getElementById('statDue').textContent = words.filter(w => !w.sm || w.sm.nextReview <= now).length;
  document.getElementById('statMastered').textContent = words.filter(w => w.sm && w.sm.interval >= 10).length;
}

function selectWord(id) {
  selectedId = id;
  const w = words.find(x => x.id === id);
  if (!w) return;
  const p = document.getElementById('detailPanel');
  p.innerHTML = `<div class="word-detail">
    <div class="detail-header">
      <h2>${w.word}</h2>
      <span class="phonetic">${w.phonetic||''}</span>
      <button class="speak-btn" onclick="speakWord('${w.word}')">🔊</button>
      <span class="word-level level-${w.level}" style="margin-left:auto">${w.level}</span>
    </div>
    <div class="detail-section"><h4>词性与释义</h4><p>${w.pos||''} ${w.def}</p></div>
    ${w.example ? `<div class="detail-section"><h4>例句</h4><p>${w.example}</p></div>` : ''}
    ${w.notes ? `<div class="detail-section"><h4>笔记</h4><p>${w.notes}</p></div>` : ''}
    <div class="detail-section"><h4>标签</h4><div class="tag-list">${(w.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>
    <div class="detail-section"><h4>复习状态</h4><p>间隔: ${w.sm?w.sm.interval:1}天 | 重复: ${w.sm?w.sm.repetition:0}次 | 下次: ${w.sm ? new Date(w.sm.nextReview).toLocaleDateString() : '今天'}</p></div>
    <div style="margin-top:16px;display:flex;gap:8px">
      <button class="btn" onclick="editWord(${w.id})">✏ 编辑</button>
      <button class="btn" onclick="deleteWord(${w.id})" style="color:var(--danger)">✕ 删除</button>
    </div>
  </div>`;
  renderList();
}

function speakWord(text) {
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.9;
    speechSynthesis.speak(u);
  }
}
function speakReviewWord() { speakWord(document.getElementById('revWord').textContent); }

function showAddModal() {
  document.getElementById('addModal').classList.add('show');
  ['fWord','fPhonetic','fDef','fExample','fNotes','fTags'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fPos').value = '';
  document.getElementById('fLevel').value = '3';
  document.getElementById('fWord').focus();
}
function hideAddModal() { document.getElementById('addModal').classList.remove('show'); }

let editingId = null;
function editWord(id) {
  const w = words.find(x => x.id === id);
  if (!w) return;
  editingId = id;
  document.getElementById('fWord').value = w.word;
  document.getElementById('fPhonetic').value = w.phonetic||'';
  document.getElementById('fPos').value = w.pos||'';
  document.getElementById('fDef').value = w.def;
  document.getElementById('fExample').value = w.example||'';
  document.getElementById('fNotes').value = w.notes||'';
  document.getElementById('fTags').value = (w.tags||[]).join(', ');
  document.getElementById('fLevel').value = w.level;
  document.getElementById('addModal').classList.add('show');
}

function saveWord() {
  const word = document.getElementById('fWord').value.trim();
  const def = document.getElementById('fDef').value.trim();
  if (!word || !def) { showToast('请填写单词和释义'); return; }
  const data = {
    word, phonetic: document.getElementById('fPhonetic').value.trim(),
    pos: document.getElementById('fPos').value,
    def, example: document.getElementById('fExample').value.trim(),
    notes: document.getElementById('fNotes').value.trim(),
    tags: document.getElementById('fTags').value.split(',').map(t=>t.trim()).filter(Boolean),
    level: parseInt(document.getElementById('fLevel').value),
  };
  if (editingId) {
    const w = words.find(x => x.id === editingId);
    Object.assign(w, data);
    editingId = null;
  } else {
    data.id = Date.now();
    data.sm = { interval: 1, repetition: 0, efactor: 2.5, nextReview: Date.now() };
    data.created = Date.now();
    words.push(data);
  }
  saveData(); hideAddModal(); renderFilters(); renderList();
  if (editingId || data.id === selectedId) selectWord(data.id);
  showToast('已保存');
}

function deleteWord(id) {
  if (!confirm('确定删除这个单词吗？')) return;
  words = words.filter(w => w.id !== id);
  if (selectedId === id) { selectedId = null; document.getElementById('detailPanel').innerHTML = '<div class="detail-empty">← 选择一个单词查看详情</div>'; }
  saveData(); renderFilters(); renderList(); showToast('已删除');
}

// SM-2 based review
function startReview() {
  const now = Date.now();
  reviewQueue = words.filter(w => !w.sm || w.sm.nextReview <= now);
  if (reviewQueue.length === 0) { showToast('暂无待复习单词'); return; }
  reviewIdx = 0;
  document.getElementById('reviewOverlay').classList.add('show');
  showReviewCard();
}

function showReviewCard() {
  if (reviewIdx >= reviewQueue.length) { endReview(); return; }
  const w = reviewQueue[reviewIdx];
  document.getElementById('revWord').textContent = w.word;
  document.getElementById('revPhonetic').textContent = w.phonetic||'';
  document.getElementById('revDef').textContent = `${w.pos||''} ${w.def}`;
  document.getElementById('revDef').classList.add('hidden');
  document.getElementById('revRevealBtn').style.display = '';
  document.getElementById('revBtns').style.display = 'none';
  document.getElementById('revProgress').textContent = `${reviewIdx+1} / ${reviewQueue.length}`;
}

function revealAnswer() {
  document.getElementById('revDef').classList.remove('hidden');
  document.getElementById('revRevealBtn').style.display = 'none';
  document.getElementById('revBtns').style.display = 'flex';
}

function rateWord(quality) {
  const w = reviewQueue[reviewIdx];
  if (!w.sm) w.sm = { interval:1, repetition:0, efactor:2.5, nextReview:Date.now() };
  const sm = w.sm;
  sm.efactor = Math.max(1.3, sm.efactor + 0.1 - (5-quality)*(0.08+(5-quality)*0.02));
  if (quality >= 2) { sm.repetition++; sm.interval = sm.repetition===1?1:sm.repetition===2?6:Math.ceil(sm.interval*sm.efactor); }
  else { sm.repetition = 0; sm.interval = 1; }
  const intervals = {0:1,1:6,2:10,3:4*24*60};
  sm.nextReview = Date.now() + (quality>=2 ? sm.interval : intervals[quality]||1)*60*1000;
  saveData(); reviewIdx++; showReviewCard();
}

function endReview() {
  document.getElementById('reviewOverlay').classList.remove('show');
  renderList(); updateStats(); showToast('复习完成');
}

function exportData() {
  const blob = new Blob([JSON.stringify(words, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `vocabulary_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); showToast('已导出');
}

function importData() { document.getElementById('importFile').click(); }
function handleImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw new Error();
      words = data; saveData(); renderFilters(); renderList();
      showToast(`已导入 ${data.length} 个单词`);
    } catch(err) { showToast('导入失败：JSON格式错误'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
}

// Init
window.addEventListener('load', () => { loadData(); renderFilters(); renderList(); });
</script>
