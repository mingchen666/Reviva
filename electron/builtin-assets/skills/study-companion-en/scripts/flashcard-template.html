<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>闪卡复习 - SM2 间隔重复</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;--surface:#ffffff;--surface2:#f0f0f3;--text:#1d1d1f;--text2:#6e6e73;
  --accent:#0071e3;--accent-hover:#0077ed;--border:#d2d2d7;--shadow:0 2px 16px rgba(0,0,0,.08);
  --radius:14px;--card-w:min(480px,92vw);--card-h:min(320px,55vh);
  --success:#34c759;--warning:#ff9f0a;--danger:#ff3b30;--easy:#5856d6;
  --flip-duration:.5s;
}
[data-theme="dark"]{
  --bg:#1c1c1e;--surface:#2c2c2e;--surface2:#3a3a3c;--text:#f5f5f7;--text2:#98989d;
  --accent:#0a84ff;--accent-hover:#409cff;--border:#48484a;--shadow:0 2px 16px rgba(0,0,0,.3);
}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;align-items:center;transition:background .3s,color .3s}

/* Header */
.header{width:100%;max-width:720px;padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.header h1{font-size:1.25rem;font-weight:700;letter-spacing:-.02em}
.header-actions{display:flex;gap:8px;align-items:center}
.icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all .2s}
.icon-btn:hover{background:var(--surface2);border-color:var(--accent)}
.icon-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Stats Bar */
.stats-bar{width:100%;max-width:720px;padding:14px 20px;display:flex;gap:8px;flex-wrap:wrap}
.stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:.8rem;color:var(--text2);display:flex;align-items:center;gap:5px;white-space:nowrap}
.stat-chip strong{color:var(--text);font-weight:600}

/* Tags Filter */
.tags-bar{width:100%;max-width:720px;padding:0 20px 10px;display:flex;gap:6px;flex-wrap:wrap}
.tag-btn{padding:4px 12px;border-radius:16px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:.75rem;cursor:pointer;transition:all .2s}
.tag-btn:hover{border-color:var(--accent);color:var(--accent)}
.tag-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Card Area */
.card-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 20px;width:100%}
.card-container{width:var(--card-w);height:var(--card-h);perspective:1200px;cursor:pointer}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform var(--flip-duration) ease}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;overflow:auto}
.card-back{transform:rotateY(180deg)}
.card-front .card-label{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.card-front .card-text{font-size:1.5rem;font-weight:600;text-align:center;line-height:1.5}
.card-back .card-label{font-size:.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.card-back .card-text{font-size:1.25rem;text-align:center;line-height:1.6;color:var(--text)}
.card-tag{position:absolute;top:12px;right:14px;font-size:.65rem;color:var(--text2);background:var(--surface2);padding:2px 8px;border-radius:8px}
.card-counter{position:absolute;bottom:12px;left:14px;font-size:.7rem;color:var(--text2)}
.hint-text{margin-top:16px;font-size:.75rem;color:var(--text2);opacity:.6}

/* Rating Buttons */
.rating-area{width:var(--card-w);padding:16px 0 8px;display:none;gap:8px;justify-content:center;flex-wrap:wrap}
.rating-area.visible{display:flex}
.rate-btn{flex:1;min-width:70px;max-width:120px;padding:10px 6px;border-radius:10px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s;color:#fff}
.rate-btn:hover{transform:translateY(-2px);filter:brightness(1.1)}
.rate-btn:active{transform:translateY(0)}
.rate-again{background:var(--danger)}.rate-hard{background:var(--warning)}.rate-good{background:var(--success)}.rate-easy{background:var(--easy)}
.rate-sub{display:block;font-size:.65rem;font-weight:400;opacity:.85;margin-top:2px}

/* Nav Buttons */
.nav-area{width:var(--card-w);padding:8px 0 20px;display:flex;justify-content:space-between;align-items:center}
.nav-btn{padding:8px 18px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.85rem;cursor:pointer;transition:all .2s}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}
.nav-info{font-size:.8rem;color:var(--text2)}

/* Action Buttons */
.actions-bar{width:100%;max-width:720px;padding:0 20px 24px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.action-btn{padding:7px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:.78rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px}
.action-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);padding:28px;width:min(440px,100%);box-shadow:0 8px 40px rgba(0,0,0,.2);max-height:90vh;overflow:auto}
.modal h2{font-size:1.1rem;font-weight:700;margin-bottom:18px}
.modal label{display:block;font-size:.78rem;color:var(--text2);margin-bottom:4px;margin-top:12px}
.modal input,.modal textarea{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.9rem;font-family:inherit;resize:vertical}
.modal textarea{min-height:60px}
.modal input:focus,.modal textarea:focus{outline:none;border-color:var(--accent)}
.modal-actions{margin-top:20px;display:flex;gap:8px;justify-content:flex-end}
.modal-btn{padding:8px 20px;border-radius:8px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s}
.modal-btn.primary{background:var(--accent);color:#fff}.modal-btn.primary:hover{filter:brightness(1.1)}
.modal-btn.secondary{background:var(--surface2);color:var(--text)}.modal-btn.secondary:hover{filter:brightness(.95)}

/* Completed Screen */
.completed{display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;flex:1}
.completed.show{display:flex}
.completed h2{font-size:1.5rem;font-weight:700;margin-bottom:8px}
.completed p{color:var(--text2);margin-bottom:24px}
.completed .big-num{font-size:3rem;font-weight:800;color:var(--accent);line-height:1}

/* Responsive */
@media(max-width:480px){
  .header h1{font-size:1.05rem}
  .card-front .card-text{font-size:1.2rem}
  .card-back .card-text{font-size:1.05rem}
  .rate-btn{min-width:60px;padding:9px 4px;font-size:.78rem}
  .stats-bar{padding:10px 16px}
  .tags-bar{padding:0 16px 8px}
}

/* Animations */
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card-container{animation:slideUp .4s ease}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>闪卡复习</h1>
  <div class="header-actions">
    <button class="icon-btn" id="shuffleBtn" title="随机排序">&#x1F500;</button>
    <button class="icon-btn" id="themeBtn" title="切换主题">&#x263E;</button>
  </div>
</div>

<!-- Stats -->
<div class="stats-bar">
  <span class="stat-chip">&#x1F4DA; 已掌握 <strong id="statMastered">0</strong></span>
  <span class="stat-chip">&#x1F4CB; 总计 <strong id="statTotal">0</strong></span>
  <span class="stat-chip">&#x1F4C5; 今日复习 <strong id="statToday">0</strong></span>
  <span class="stat-chip">&#x23F0; 待复习 <strong id="statDue">0</strong></span>
</div>

<!-- Tags -->
<div class="tags-bar" id="tagsBar"></div>

<!-- Card -->
<div class="card-area">
  <div class="card-container" id="cardContainer">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <span class="card-tag" id="cardTag"></span>
        <span class="card-label">正面</span>
        <div class="card-text" id="frontText"></div>
        <span class="card-counter" id="cardCounter"></span>
        <div class="hint-text">点击翻转</div>
      </div>
      <div class="card-face card-back">
        <span class="card-label">背面</span>
        <div class="card-text" id="backText"></div>
      </div>
    </div>
  </div>

  <!-- Rating -->
  <div class="rating-area" id="ratingArea">
    <button class="rate-btn rate-again" data-rating="0">重来<span class="rate-sub">1分钟后</span></button>
    <button class="rate-btn rate-hard" data-rating="1">困难<span class="rate-sub" id="hardInterval"></span></button>
    <button class="rate-btn rate-good" data-rating="3">良好<span class="rate-sub" id="goodInterval"></span></button>
    <button class="rate-btn rate-easy" data-rating="5">简单<span class="rate-sub" id="easyInterval"></span></button>
  </div>

  <!-- Nav -->
  <div class="nav-area">
    <button class="nav-btn" id="prevBtn" disabled>&#x2190; 上一张</button>
    <span class="nav-info" id="navInfo"></span>
    <button class="nav-btn" id="nextBtn">下一张 &#x2192;</button>
  </div>
</div>

<!-- Completed -->
<div class="completed" id="completedScreen">
  <div class="big-num" id="completedNum">0</div>
  <h2>今日复习已完成!</h2>
  <p>所有到期卡片已复习完毕，继续保持!</p>
  <button class="nav-btn" id="reviewAllBtn">复习全部卡片</button>
</div>

<!-- Actions -->
<div class="actions-bar">
  <button class="action-btn" id="addCardBtn">&#x2795; 添加卡片</button>
  <button class="action-btn" id="exportBtn">&#x1F4E4; 导出Anki TSV</button>
  <button class="action-btn" id="resetBtn">&#x1F504; 重置进度</button>
</div>

<!-- Add Card Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>添加新卡片</h2>
    <label for="newFront">正面内容</label>
    <input type="text" id="newFront" placeholder="输入问题或术语...">
    <label for="newBack">背面内容</label>
    <textarea id="newBack" placeholder="输入答案或解释..."></textarea>
    <label for="newTags">标签（逗号分隔）</label>
    <input type="text" id="newTags" placeholder="例如: 词汇, 英语">
    <div class="modal-actions">
      <button class="modal-btn secondary" id="modalCancel">取消</button>
      <button class="modal-btn primary" id="modalSave">保存</button>
    </div>
  </div>
</div>

<script>
// ========== 卡片数据 ==========
const DEFAULT_CARDS = [
  { front: "苹果", back: "Apple\n一种常见的圆形水果，红色或绿色", tags: ["词汇", "水果"] },
  { front: "蝴蝶", back: "Butterfly\n鳞翅目昆虫，翅膀色彩斑斓", tags: ["词汇", "动物"] },
  { front: "光合作用", back: "Photosynthesis\n植物利用光能将CO2和H2O转化为有机物和O2的过程", tags: ["科学", "生物"] },
  { front: "E = mc²", back: "质能方程\n爱因斯坦提出，能量等于质量乘以光速的平方", tags: ["科学", "物理"] },
  { front: "迭代", back: "Iteration\n重复执行一系列运算步骤的过程，是编程的核心概念之一", tags: ["编程", "概念"] },
  { front: "递归", back: "Recursion\n函数在其定义中调用自身的方法，需有终止条件", tags: ["编程", "概念"] },
  { front: "东京", back: "Tokyo\n日本首都，世界上最大的都市圈之一", tags: ["地理", "城市"] },
  { front: "O(n log n)", back: "快速排序的平均时间复杂度\n分治策略，最坏情况O(n²)", tags: ["编程", "算法"] },
];

// ========== SM-2 算法 ==========
const SM2 = {
  init() {
    return { ef: 2.5, interval: 0, rep: 0, nextReview: Date.now() };
  },
  rate(card, rating) {
    const d = card.sm2 || this.init();
    if (rating >= 3) {
      d.rep++;
      if (d.rep === 1) d.interval = 1;
      else if (d.rep === 2) d.interval = 6;
      else d.interval = Math.round(d.interval * d.ef);
    } else {
      d.rep = 0;
      d.interval = 1;
    }
    d.ef = Math.max(1.3, d.ef + (0.1 - (5 - rating) * (0.08 + (5 - rating) * 0.02)));
    d.nextReview = Date.now() + d.interval * 86400000;
    card.sm2 = d;
    return d;
  },
  isDue(card) {
    const d = card.sm2 || this.init();
    return Date.now() >= d.nextReview;
  },
  isMastered(card) {
    const d = card.sm2 || this.init();
    return d.rep >= 5 && d.interval >= 21;
  },
  previewIntervals(card) {
    const d = card.sm2 || this.init();
    const sim = (r) => {
      const c = { sm2: { ...d } };
      const res = this.rate(c, r);
      return res.interval;
    };
    return { hard: sim(1), good: sim(3), easy: sim(5) };
  }
};

// ========== 应用状态 ==========
let cards = [];
let filteredIndices = [];
let currentIdx = 0;
let isFlipped = false;
let activeTag = null;
let todayCount = 0;

// ========== 存储 ==========
function save() {
  localStorage.setItem("flashcard_cards", JSON.stringify(cards));
  localStorage.setItem("flashcard_today", JSON.stringify({ date: new Date().toDateString(), count: todayCount }));
}
function load() {
  const saved = localStorage.getItem("flashcard_cards");
  cards = saved ? JSON.parse(saved) : DEFAULT_CARDS.map(c => ({ ...c, sm2: SM2.init() }));
  const td = localStorage.getItem("flashcard_today");
  if (td) {
    const t = JSON.parse(td);
    todayCount = t.date === new Date().toDateString() ? t.count : 0;
  }
  if (!saved) save();
}

// ========== 筛选 ==========
function getAllTags() {
  const s = new Set();
  cards.forEach(c => (c.tags || []).forEach(t => s.add(t)));
  return [...s].sort();
}
function applyFilter() {
  if (activeTag) {
    filteredIndices = cards.map((_, i) => i).filter(i => (cards[i].tags || []).includes(activeTag));
  } else {
    filteredIndices = cards.map((_, i) => i);
  }
  if (currentIdx >= filteredIndices.length) currentIdx = Math.max(0, filteredIndices.length - 1);
}

// ========== 渲染 ==========
const $ = id => document.getElementById(id);

function renderTags() {
  const bar = $("tagsBar");
  const tags = getAllTags();
  bar.innerHTML = `<button class="tag-btn ${!activeTag ? 'active' : ''}" data-tag="">全部</button>` +
    tags.map(t => `<button class="tag-btn ${activeTag === t ? 'active' : ''}" data-tag="${t}">${t}</button>`).join("");
  bar.querySelectorAll(".tag-btn").forEach(btn => {
    btn.onclick = () => { activeTag = btn.dataset.tag || null; applyFilter(); renderTags(); showCard(); };
  });
}

function renderStats() {
  $("statTotal").textContent = cards.length;
  $("statMastered").textContent = cards.filter(c => SM2.isMastered(c)).length;
  $("statToday").textContent = todayCount;
  $("statDue").textContent = cards.filter(c => SM2.isDue(c)).length;
}

function showCard() {
  const area = $("cardArea") || document.querySelector(".card-area");
  const completed = $("completedScreen");
  if (filteredIndices.length === 0) {
    area.style.display = "none";
    completed.classList.add("show");
    $("completedNum").textContent = todayCount;
    return;
  }
  area.style.display = "";
  completed.classList.remove("show");

  const ci = filteredIndices[currentIdx];
  const card = cards[ci];
  isFlipped = false;
  $("cardInner").classList.remove("flipped");
  $("frontText").textContent = card.front;
  $("backText").textContent = card.back;
  $("cardTag").textContent = (card.tags || []).join(", ");
  $("cardCounter").textContent = `${currentIdx + 1} / ${filteredIndices.length}`;
  $("ratingArea").classList.remove("visible");
  $("prevBtn").disabled = currentIdx === 0;
  $("nextBtn").disabled = currentIdx >= filteredIndices.length - 1;
  $("navInfo").textContent = `${currentIdx + 1} / ${filteredIndices.length}`;

  const prev = SM2.previewIntervals(card);
  $("hardInterval").textContent = prev.hard + "天后";
  $("goodInterval").textContent = prev.good + "天后";
  $("easyInterval").textContent = prev.easy + "天后";

  renderStats();
}

// ========== 事件 ==========
function flipCard() {
  if (!isFlipped) {
    isFlipped = true;
    $("cardInner").classList.add("flipped");
    $("ratingArea").classList.add("visible");
  }
}

function rateCard(rating) {
  const ci = filteredIndices[currentIdx];
  SM2.rate(cards[ci], rating);
  todayCount++;
  save();
  if (currentIdx < filteredIndices.length - 1) {
    currentIdx++;
    showCard();
  } else {
    showCard();
  }
}

function goNext() {
  if (currentIdx < filteredIndices.length - 1) { currentIdx++; showCard(); }
}
function goPrev() {
  if (currentIdx > 0) { currentIdx--; showCard(); }
}

function shuffleCards() {
  for (let i = filteredIndices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filteredIndices[i], filteredIndices[j]] = [filteredIndices[j], filteredIndices[i]];
  }
  currentIdx = 0;
  showCard();
  const btn = $("shuffleBtn");
  btn.classList.add("active");
  setTimeout(() => btn.classList.remove("active"), 600);
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute("data-theme") === "dark";
  html.setAttribute("data-theme", isDark ? "light" : "dark");
  $("themeBtn").innerHTML = isDark ? "&#x263E;" : "&#x2600;";
  localStorage.setItem("flashcard_theme", isDark ? "light" : "dark");
}

function addCard() {
  $("newFront").value = "";
  $("newBack").value = "";
  $("newTags").value = "";
  $("addModal").classList.add("open");
  $("newFront").focus();
}

function saveNewCard() {
  const front = $("newFront").value.trim();
  const back = $("newBack").value.trim();
  if (!front || !back) return;
  const tags = $("newTags").value.split(/[,，]/).map(t => t.trim()).filter(Boolean);
  cards.push({ front, back, tags, sm2: SM2.init() });
  save();
  $("addModal").classList.remove("open");
  applyFilter();
  renderTags();
  currentIdx = filteredIndices.length - 1;
  showCard();
}

function exportAnki() {
  let tsv = "Front\tBack\tTags\n";
  cards.forEach(c => {
    const f = c.front.replace(/\t/g, " ");
    const b = c.back.replace(/\t/g, " ").replace(/\n/g, "<br>");
    const t = (c.tags || []).join(" ");
    tsv += `${f}\t${b}\t${t}\n`;
  });
  const blob = new Blob([tsv], { type: "text/tab-separated-values;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "flashcards.tsv";
  a.click();
  URL.revokeObjectURL(a.href);
}

function resetProgress() {
  if (!confirm("确定要重置所有复习进度吗？此操作不可撤销。")) return;
  cards.forEach(c => c.sm2 = SM2.init());
  todayCount = 0;
  save();
  applyFilter();
  currentIdx = 0;
  showCard();
}

function showDueOnly() {
  activeTag = null;
  filteredIndices = cards.map((_, i) => i).filter(i => SM2.isDue(cards[i]));
  currentIdx = 0;
  renderTags();
  showCard();
}

// ========== 绑定事件 ==========
$("cardContainer").onclick = flipCard;
document.querySelectorAll(".rate-btn").forEach(btn => {
  btn.onclick = () => rateCard(parseInt(btn.dataset.rating));
});
$("nextBtn").onclick = goNext;
$("prevBtn").onclick = goPrev;
$("shuffleBtn").onclick = shuffleCards;
$("themeBtn").onclick = toggleTheme;
$("addCardBtn").onclick = addCard;
$("exportBtn").onclick = exportAnki;
$("resetBtn").onclick = resetProgress;
$("modalCancel").onclick = () => $("addModal").classList.remove("open");
$("modalSave").onclick = saveNewCard;
$("reviewAllBtn").onclick = () => { activeTag = null; filteredIndices = cards.map((_, i) => i); currentIdx = 0; renderTags(); showCard(); };
$("addModal").onclick = e => { if (e.target === $("addModal")) $("addModal").classList.remove("open"); };

document.addEventListener("keydown", e => {
  if ($("addModal").classList.contains("open")) {
    if (e.key === "Escape") $("addModal").classList.remove("open");
    return;
  }
  if (e.key === " " || e.key === "Enter") { e.preventDefault(); flipCard(); }
  else if (e.key === "ArrowRight" || e.key === "n") goNext();
  else if (e.key === "ArrowLeft" || e.key === "p") goPrev();
  else if (e.key === "1") rateCard(0);
  else if (e.key === "2") rateCard(1);
  else if (e.key === "3") rateCard(3);
  else if (e.key === "4") rateCard(5);
  else if (e.key === "s") shuffleCards();
});

// ========== 初始化 ==========
(function init() {
  const theme = localStorage.getItem("flashcard_theme");
  if (theme) {
    document.documentElement.setAttribute("data-theme", theme);
    $("themeBtn").innerHTML = theme === "dark" ? "&#x2600;" : "&#x263E;";
  }
  load();
  applyFilter();
  renderTags();
  showCard();
})();
</script>
</body>
</html>
