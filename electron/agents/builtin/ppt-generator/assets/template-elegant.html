<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1a2e;
  --accent: #e94560;
  --text: #eaeaea;
  --text-sub: rgba(234,234,234,0.7);
  --text-dim: rgba(234,234,234,0.4);
  --font-title: 'Noto Serif SC', serif;
  --font-body: 'Inter', sans-serif;
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-body); }
.deck { width: 100%; height: 100%; position: relative; }
.slide { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 60px 80px; opacity: 0; transform: translateY(20px); transition: opacity 0.5s, transform 0.5s; }
.slide.active { opacity: 1; transform: translateY(0); }
.slide h1 { font-family: var(--font-title); font-size: 48px; font-weight: 700; line-height: 1.2; text-align: center; margin-bottom: 16px; }
.slide h2 { font-family: var(--font-title); font-size: 36px; font-weight: 600; line-height: 1.3; margin-bottom: 24px; }
.slide p, .slide li { font-size: 18px; line-height: 1.8; color: var(--text-sub); }
.slide .accent { color: var(--accent); }
.slide .subtitle { font-size: 20px; color: var(--text-sub); text-align: center; }
.slide .author { font-size: 14px; color: var(--text-dim); margin-top: 40px; }
.points { list-style: none; text-align: left; width: 100%; max-width: 700px; }
.points li { padding: 8px 0; padding-left: 20px; position: relative; }
.points li::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
.points li strong { color: var(--text); font-weight: 600; }
.nav { position: fixed; bottom: 20px; right: 30px; display: flex; align-items: center; gap: 12px; z-index: 100; }
.nav span { font-size: 14px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
.dots { display: flex; gap: 6px; }
.dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); transition: background 0.3s; cursor: pointer; }
.dots span.active { background: var(--accent); }
</style>
</head>
<body>
<div class="deck">
  <!-- SLIDES_HERE -->
</div>
<div class="nav">
  <div class="dots" id="dots"></div>
  <span id="counter">1 / 1</span>
</div>
<script>
const slides = document.querySelectorAll('.slide');
const dots = document.getElementById('dots');
const counter = document.getElementById('counter');
let current = 0;
function show(n) {
  if (n < 0 || n >= slides.length) return;
  slides[current].classList.remove('active');
  dots.children[current].classList.remove('active');
  current = n;
  slides[current].classList.add('active');
  dots.children[current].classList.add('active');
  counter.textContent = `${current + 1} / ${slides.length}`;
}
slides.forEach((_, i) => { const d = document.createElement('span'); d.onclick = () => show(i); dots.appendChild(d); });
show(0);
document.addEventListener('keydown', e => { if (e.key === 'ArrowRight' || e.key === ' ') show(current + 1); else if (e.key === 'ArrowLeft') show(current - 1); });
</script>
</body>
</html>
