<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafafa;
  --accent: #e63946;
  --text: #1d3557;
  --text-sub: rgba(29,53,87,0.6);
  --text-dim: rgba(29,53,87,0.3);
  --font: 'Inter', sans-serif;
  --grid-color: rgba(0,0,0,0.04);
  --radius: 4px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); }
.deck { width: 100%; height: 100%; position: relative; }
.slide { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; padding: 60px 80px; opacity: 0; transform: translateY(20px); transition: opacity 0.5s, transform 0.5s; background-image: radial-gradient(circle, var(--grid-color) 1px, transparent 1px); background-size: 24px 24px; }
.slide.active { opacity: 1; transform: translateY(0); }
.slide h1 { font-size: 56px; font-weight: 900; line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 12px; }
.slide h2 { font-size: 32px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 20px; }
.slide p, .slide li { font-size: 17px; line-height: 1.7; color: var(--text-sub); }
.slide .accent { color: var(--accent); }
.slide .subtitle { font-size: 18px; color: var(--text-sub); font-weight: 400; }
.slide .author { font-size: 13px; color: var(--text-dim); margin-top: 40px; letter-spacing: 0.05em; text-transform: uppercase; }
.points { list-style: none; }
.points li { padding: 6px 0; padding-left: 16px; position: relative; font-weight: 500; }
.points li::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 6px; height: 6px; background: var(--accent); }
.points li strong { color: var(--text); font-weight: 700; }
.comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 20px; }
.comparison .col h3 { font-size: 20px; font-weight: 700; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--accent); }
.nav { position: fixed; bottom: 20px; right: 30px; display: flex; align-items: center; gap: 12px; z-index: 100; }
.nav span { font-size: 13px; color: var(--text-dim); font-variant-numeric: tabular-nums; font-weight: 500; }
.dots { display: flex; gap: 6px; }
.dots span { width: 8px; height: 8px; background: var(--text-dim); transition: background 0.3s; cursor: pointer; }
.dots span.active { background: var(--accent); }
</style>
</head>
<body>
<div class="deck">
  <!-- SLIDES_HERE -->
</div>
<div class="nav">
  <div class="dots" id="dots"></div>
  <span id="counter">1 / 1</span>
</div>
<script>
const slides = document.querySelectorAll('.slide');
const dots = document.getElementById('dots');
const counter = document.getElementById('counter');
let current = 0;
function show(n) {
  if (n < 0 || n >= slides.length) return;
  slides[current].classList.remove('active');
  dots.children[current].classList.remove('active');
  current = n;
  slides[current].classList.add('active');
  dots.children[current].classList.add('active');
  counter.textContent = `${current + 1} / ${slides.length}`;
}
slides.forEach((_, i) => { const d = document.createElement('span'); d.onclick = () => show(i); dots.appendChild(d); });
show(0);
document.addEventListener('keydown', e => { if (e.key === 'ArrowRight' || e.key === ' ') show(current + 1); else if (e.key === 'ArrowLeft') show(current - 1); });
</script>
</body>
</html>
